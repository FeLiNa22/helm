name: nextcloud
maintainers:
  - name: raulpatel
    url: https://raulpatel.com
apiVersion: v2
appVersion: "33.0.0"
version: 2.0.1
description: Nextcloud Helm Chart
type: application
home: https://github.com/FeLiNa22/homeserver/tree/main/charts/nextcloud
icon: https://raulpatel.com/images/raul.svg
keywords:
  - kubernetes
  - nextcloud
  - cloud
  - storage
sources:
  - https://github.com/nextcloud/server
  - https://github.com/nextcloud/helm

dependencies:
  - name: nextcloud
    version: "9.0.3"
    repository: "https://nextcloud.github.io/helm/"
    alias: nextcloud
  - name: postgres
    version: ">=1.0.0"
    repository: "file://../postgres"
    alias: postgres
    condition: postgres.enabled
  - name: dragonfly
    version: ">=1.0.0"
    repository: "file://../dragonfly"
    alias: dragonfly
    condition: dragonfly.enabled
