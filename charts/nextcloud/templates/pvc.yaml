{{- if and .Values.nextcloud.persistence.enabled (eq .Values.nextcloud.persistence.existingClaim .Release.Name) }}
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - {{ .Values.nextcloud.persistence.accessMode | quote }}
  {{- if .Values.nextcloud.persistence.storageClass }}
  storageClassName: {{ .Values.nextcloud.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.nextcloud.persistence.size | quote }}
{{- end }}
