{{- if and .Values.enabled .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-cron
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronjob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          volumes:
            - name: data
              {{- if .Values.persistence.enabled }}
              persistentVolumeClaim:
                claimName: {{ .Values.persistence.existingClaim | default .Release.Name }}
              {{- else }}
              emptyDir: {}
              {{- end }}
            {{- if .Values.persistence.additionalVolumes }}
              {{- .Values.persistence.additionalVolumes | toYaml | nindent 12 }}
            {{- end }}
          containers:
            - name: {{ .Chart.Name }}-cron
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - /bin/sh
                - -c
                - php -f /var/www/html/cron.php
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              volumeMounts:
                - mountPath: /var/www/html
                  name: data
              {{- if .Values.persistence.additionalMounts }}
                {{- .Values.persistence.additionalMounts | toYaml | nindent 16 }}
              {{- end }}
              env:
                {{- if eq .Values.postgres.mode "standalone" }}
                - name: POSTGRES_HOST
                  value: {{ .Release.Name }}-postgres
                - name: POSTGRES_DB
                  value: {{ include "nextcloud.postgresql.database" . }}
                - name: POSTGRES_USER
                  value: {{ .Values.postgres.username }}
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "nextcloud.postgresql.secretName" . }}
                      key: password
                {{- else if eq .Values.postgres.mode "cluster" }}
                - name: POSTGRES_HOST
                  value: {{ include "nextcloud.postgresql.host" . }}
                - name: POSTGRES_DB
                  value: {{ include "nextcloud.postgresql.database" . }}
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "nextcloud.postgresql.secretName" . }}
                      key: username
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "nextcloud.postgresql.secretName" . }}
                      key: password
                {{- else if eq .Values.postgres.mode "external" }}
                - name: POSTGRES_HOST
                  value: {{ .Values.postgres.external.host }}:{{ .Values.postgres.external.port | default 5432 }}
                - name: POSTGRES_DB
                  value: {{ include "nextcloud.postgresql.database" . }}
                - name: POSTGRES_USER
                  value: {{ .Values.postgres.username }}
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "nextcloud.postgresql.secretName" . }}
                      key: password
                {{- end }}
                {{- if and (ne .Values.dragonfly.mode "disabled") (ne .Values.dragonfly.mode "") }}
                - name: REDIS_HOST
                  value: {{ include "nextcloud.dragonfly.host" . }}
                - name: REDIS_HOST_PORT
                  value: {{ include "nextcloud.dragonfly.port" . | quote }}
                - name: REDIS_HOST_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "nextcloud.dragonfly.secretName" . }}
                      key: {{ include "nextcloud.dragonfly.passwordKey" . }}
                {{- end }}
                - name: NEXTCLOUD_DATA_DIR
                  value: /var/www/html/data
                {{- range $k,$v := .Values.env }}
                - name: {{ $k }}
                  value: {{ $v | quote }}
                {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
