## @section Nextcloud upstream chart parameters
## Configuration for the upstream nextcloud/nextcloud Helm chart.
## Full reference: https://github.com/nextcloud/helm/blob/main/charts/nextcloud/values.yaml
##
## ⚠️  The 'nextcloud' key below maps to the upstream nextcloud/nextcloud chart dependency.
##    All standard upstream chart values can be set here.

## @param nextcloud.internalDatabase.enabled Disable the built-in SQLite database (we use postgres subchart instead).
## @param nextcloud.externalDatabase.enabled Enable external PostgreSQL database.
## @param nextcloud.externalDatabase.type Database type (postgresql or mysql).
## @param nextcloud.externalDatabase.host Hostname of the PostgreSQL service.
## @param nextcloud.externalDatabase.database Database name.
## @param nextcloud.externalDatabase.existingSecret.enabled Use an existing secret for database credentials.
## @param nextcloud.externalDatabase.existingSecret.secretName Name of the secret containing database credentials.
## @param nextcloud.externalDatabase.existingSecret.usernameKey Key in the secret for the username.
## @param nextcloud.externalDatabase.existingSecret.passwordKey Key in the secret for the password.
## @param nextcloud.externalRedis.enabled Enable external Redis/DragonflyDB for caching.
## @param nextcloud.externalRedis.host Hostname of the Redis/DragonflyDB service.
## @param nextcloud.externalRedis.port Port of the Redis/DragonflyDB service.
## @param nextcloud.externalRedis.existingSecret.enabled Use an existing secret for Redis credentials.
## @param nextcloud.externalRedis.existingSecret.secretName Name of the secret containing Redis credentials.
## @param nextcloud.externalRedis.existingSecret.passwordKey Key in the secret for the Redis password.
## @param nextcloud.nextcloud.host The hostname for Nextcloud (used in the Nextcloud config and probes).
## @param nextcloud.nextcloud.username Nextcloud admin username.
## @param nextcloud.nextcloud.password Nextcloud admin password.
## @param nextcloud.image.registry Docker registry for the Nextcloud image.
## @param nextcloud.image.repository Docker image repository for Nextcloud.
## @param nextcloud.image.tag Nextcloud image tag.
## @param nextcloud.ingress.enabled Whether to create an Ingress resource.
## @param nextcloud.ingress.annotations Additional annotations for the Ingress.
## @param nextcloud.ingress.path Ingress path.
## @param nextcloud.ingress.pathType Ingress path type.
## @param nextcloud.persistence.enabled Enable persistent storage for Nextcloud data.
## @param nextcloud.persistence.storageClass Storage class for the PVC.
## @param nextcloud.persistence.size Size of the persistent volume.
## @param nextcloud.postgresql.enabled Disable the Bitnami PostgreSQL subchart (we use our own postgres subchart).
## @param nextcloud.mariadb.enabled Disable the Bitnami MariaDB subchart (we use our own postgres subchart).
## @param nextcloud.redis.enabled Disable the Bitnami Redis subchart (we use our own dragonfly subchart).
##
nextcloud:
  internalDatabase:
    enabled: false

  ## External PostgreSQL configuration.
  ## The host and secret name below follow the naming convention of the postgres subchart:
  ##   host: {release-name}-postgres-cluster-rw  (cluster mode)
  ##         {release-name}-postgres              (standalone mode)
  ##   secretName: {release-name}-postgres-secret
  ## ⚠️  Update these values to match your Helm release name if it differs from "nextcloud".
  externalDatabase:
    enabled: true
    type: postgresql
    host: "nextcloud-postgres-cluster-rw"
    database: nextcloud
    existingSecret:
      enabled: true
      secretName: "nextcloud-postgres-secret"
      usernameKey: username
      passwordKey: password

  ## External Redis/DragonflyDB configuration.
  ## The host and secret name below follow the naming convention of the dragonfly subchart:
  ##   host: {release-name}-dragonfly         (standalone mode)
  ##         {release-name}-dragonfly-cluster  (cluster mode)
  ##   secretName: {release-name}-dragonfly-secret
  ## ⚠️  Update these values to match your Helm release name if it differs from "nextcloud".
  ## Set enabled: true when dragonfly.mode is not 'disabled'.
  externalRedis:
    enabled: false
    host: "nextcloud-dragonfly"
    port: "6379"
    existingSecret:
      enabled: true
      secretName: "nextcloud-dragonfly-secret"
      passwordKey: password

  nextcloud:
    host: nextcloud.example.com
    username: admin
    password: changeme

  image:
    registry: docker.io
    repository: library/nextcloud
    tag: "33.0.0"
    pullPolicy: IfNotPresent

  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # nginx.ingress.kubernetes.io/proxy-body-size: 4G
    path: /
    pathType: Prefix
    tls: []

  persistence:
    enabled: true
    storageClass: ""
    size: 8Gi
    existingClaim: ""

  resources: {}

  ## Disable Bitnami subcharts — we use the postgres and dragonfly subcharts instead.
  postgresql:
    enabled: false
  mariadb:
    enabled: false
  redis:
    enabled: false

## @section DragonflyDB parameters
## DragonflyDB provides Redis-compatible caching for Nextcloud.
## When enabling, also set nextcloud.externalRedis.enabled: true and
## update nextcloud.externalRedis.host to match the release name.

## @param dragonfly.enabled Enable the dragonfly subchart.
## @param dragonfly.mode The mode of DragonflyDB deployment: 'standalone', 'cluster', 'external', or 'disabled'.
## @param dragonfly.username Username for DragonflyDB authentication (default: "default").
## @param dragonfly.password.secretName Name of existing secret containing the password.
## @param dragonfly.password.secretKey Key in the secret containing the password.
## @param dragonfly.password.value Direct password value.
## @param dragonfly.standalone.image.repository The Docker repository for Dragonfly image.
## @param dragonfly.standalone.image.tag The image tag for Dragonfly.
## @param dragonfly.standalone.resources.limits.memory Memory limit for standalone Dragonfly.
## @param dragonfly.standalone.persistence.enabled Whether to enable persistence for standalone Dragonfly.
## @param dragonfly.standalone.persistence.size Size of the persistence volume for standalone Dragonfly.
## @param dragonfly.standalone.persistence.storageClass Storage class for standalone Dragonfly persistence.
## @param dragonfly.standalone.persistence.accessMode Access mode for standalone Dragonfly persistence volume.
## @param dragonfly.cluster.replicas Number of Dragonfly replicas in the cluster.
## @param dragonfly.cluster.image.repository The Docker repository for Dragonfly cluster image.
## @param dragonfly.cluster.image.tag The image tag for Dragonfly cluster.
## @param dragonfly.cluster.resources.limits.memory Memory limit for Dragonfly cluster.
## @param dragonfly.cluster.persistence.enabled Whether to enable persistence for Dragonfly cluster.
## @param dragonfly.cluster.persistence.size Size of the persistence volume for Dragonfly cluster.
## @param dragonfly.cluster.persistence.storageClass Storage class for Dragonfly cluster persistence.
## @param dragonfly.cluster.persistence.accessMode Access mode for Dragonfly cluster persistence volume.
## @param dragonfly.external.host Hostname of external DragonflyDB/Redis (when mode is 'external').
## @param dragonfly.external.port Port of external DragonflyDB/Redis.
##
dragonfly:
  enabled: false
  # Mode options: 'standalone', 'cluster', 'external', or 'disabled'
  # When changing from 'disabled', also set nextcloud.externalRedis.enabled: true
  mode: disabled

  # Username for DragonflyDB authentication
  username: "default"

  # Secret configuration for DragonflyDB password
  password:
    secretName: ""
    secretKey: "password"
    value: ""

  # Standalone Dragonfly deployment
  standalone:
    image:
      repository: docker.dragonflydb.io/dragonflydb/dragonfly
      tag: "v1.25.2"
    resources:
      limits:
        memory: 512Mi
    persistence:
      enabled: true
      size: 512Mi
      storageClass: ""
      accessMode: ReadWriteOnce

  # Dragonfly Cluster deployment (using DragonflyDB operator)
  cluster:
    replicas: 2
    image:
      repository: docker.dragonflydb.io/dragonflydb/dragonfly
      tag: "v1.25.2"
    resources:
      limits:
        memory: 512Mi
    persistence:
      enabled: true
      size: 512Mi
      storageClass: ""
      accessMode: ReadWriteOnce
    snapshot:
      cron: "*/5 * * * *"

  # External DragonflyDB/Redis configuration (used when mode is 'external')
  external:
    host: ""
    port: 6379

## @section PostgreSQL parameters

## @param postgres.enabled Enable the postgres subchart.
## @param postgres.mode The mode of PostgreSQL deployment: 'standalone', 'cluster', or 'external'.
## @param postgres.initSQL Array of SQL commands to run on database initialization.
## @param postgres.username Username for the database.
## @param postgres.database Database name for PostgreSQL.
## @param postgres.password.secretName Existing secret name for database password.
## @param postgres.password.value Direct password value to create a secret.
## @param postgres.standalone.persistence.enabled Enable persistence for standalone PostgreSQL.
## @param postgres.standalone.persistence.size Size of the persistence volume.
## @param postgres.standalone.persistence.storageClass Storage class for persistence.
## @param postgres.standalone.persistence.existingClaim Use an existing PVC.
## @param postgres.standalone.image.repository PostgreSQL image repository.
## @param postgres.standalone.image.tag PostgreSQL image tag.
## @param postgres.standalone.image.autoupdate.enabled Enable automatic image updates for standalone database.
## @param postgres.standalone.image.autoupdate.updateStrategy Strategy for image updates.
## @param postgres.standalone.resources Resource limits and requests for standalone PostgreSQL.
## @param postgres.cluster.instances Number of PostgreSQL instances (replicas).
## @param postgres.cluster.persistence.enabled Enable persistence for cluster PostgreSQL.
## @param postgres.cluster.persistence.size Size of the persistence volume.
## @param postgres.cluster.persistence.storageClass Storage class for persistence.
## @param postgres.cluster.image.repository PostgreSQL container image repository.
## @param postgres.cluster.image.tag PostgreSQL container image tag.
## @param postgres.external.host Hostname of external PostgreSQL (when mode is 'external').
## @param postgres.external.port Port of external PostgreSQL.
##
postgres:
  enabled: true
  # Mode options: 'standalone', 'cluster', or 'external'
  mode: cluster
  # SQL commands to initialize the database
  initSQL: []

  username: nextcloud
  database: "nextcloud"

  # Secret configuration for database password
  password:
    secretName: "nextcloud-postgres-secret"
    value: ""

  # Standalone PostgreSQL deployment (using StatefulSet)
  standalone:
    image:
      repository: postgres
      tag: "16-alpine"
      autoupdate:
        enabled: false
        updateStrategy: ""
    resources: {}

    persistence:
      enabled: true
      size: 512Mi
      storageClass: "ceph-rbd"
      existingClaim: ""

  # CloudNativePG Cluster deployment (using CNPG operator)
  cluster:
    persistence:
      enabled: true
      size: 512Mi
      storageClass: "ceph-rbd"

    instances: 2
    image:
      repository: ghcr.io/cloudnative-pg/postgresql
      tag: "16"

  # External PostgreSQL configuration (used when mode is 'external')
  external:
    host: ""
    port: 5432

## @section Velero Backup Schedule parameters

## @param velero.enabled Whether to enable Velero backup schedules.
## @param velero.namespace The namespace where Velero is deployed.
## @param velero.schedule The cron schedule for Velero backups.
## @param velero.ttl Time to live for backups.
## @param velero.includeClusterResources Whether to include cluster-scoped resources in backup.
## @param velero.snapshotVolumes Whether to take volume snapshots.
## @param velero.defaultVolumesToFsBackup Whether to use file system backup for volumes by default.
## @param velero.storageLocation The storage location for backups.
## @param velero.volumeSnapshotLocations The volume snapshot locations.
## @param velero.labelSelector Additional label selector to filter resources.
## @param velero.annotations Additional annotations to add to the Velero Schedule resources.
velero:
  enabled: false
  namespace: "velero"
  schedule: "0 2 * * *"
  ttl: "168h"
  includeClusterResources: false
  snapshotVolumes: true
  defaultVolumesToFsBackup: false
  storageLocation: ""
  volumeSnapshotLocations: []
  labelSelector: {}
  annotations: {}

## @section Image autoupdate parameters (ArgoCD Image Updater)

## @param image.autoupdate.enabled Enable automatic image updates via ArgoCD Image Updater.
## @param image.autoupdate.strategy Strategy for image updates (semver, latest, newest-build, name, alphabetical, digest).
## @param image.autoupdate.allowTags Match function for allowed tags.
## @param image.autoupdate.ignoreTags List of glob patterns to ignore specific tags.
## @param image.autoupdate.pullSecret Reference to secret for private registry authentication.
## @param image.autoupdate.platforms List of target platforms.
image:
  autoupdate:
    enabled: false
    strategy: ""
    allowTags: ""
    ignoreTags: []
    pullSecret: ""
    platforms: []

## @section ArgoCD Image Updater parameters

## @param imageUpdater.namespace Namespace where the ImageUpdater CRD will be created.
## @param imageUpdater.argocdNamespace Namespace where ArgoCD Applications are located.
## @param imageUpdater.applicationName Name or pattern of the ArgoCD Application to update.
## @param imageUpdater.imageAlias Alias for the image in the ImageUpdater CRD.
## @param imageUpdater.forceUpdate Force update even if image is not currently deployed.
## @param imageUpdater.helm Helm-specific configuration for parameter names.
## @param imageUpdater.kustomize Kustomize-specific configuration.
## @param imageUpdater.writeBackConfig Write-back configuration for GitOps.
##
imageUpdater:
  namespace: argocd
  argocdNamespace: argocd
  applicationName: ""
  imageAlias: ""
  forceUpdate: false
  helm: {}
  kustomize: {}
  writeBackConfig: {}
