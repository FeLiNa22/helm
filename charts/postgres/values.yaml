## @section PostgreSQL parameters

## @param mode Deployment mode: 'standalone', 'cluster', or 'external'.
mode: standalone

## @param username PostgreSQL username.
username: postgres

## @param database PostgreSQL database name.
database: postgres

## @param initSQL Array of SQL statements to execute after database creation (e.g. CREATE EXTENSION).
initSQL: []

## @param password.secretName Name of an existing secret containing the password (mutually exclusive with value).
## @param password.value Plain-text password. Creates a Secret when set (mutually exclusive with secretName).
password:
  secretName: ""
  value: ""

## @param standalone.image.repository Docker image repository for standalone PostgreSQL.
## @param standalone.image.tag Docker image tag for standalone PostgreSQL.
## @param standalone.resources Resource requests/limits for standalone PostgreSQL.
## @param standalone.persistence.enabled Enable persistent storage for standalone PostgreSQL.
## @param standalone.persistence.size Size of the persistent volume.
## @param standalone.persistence.storageClass Storage class for the persistent volume.
## @param standalone.persistence.existingClaim Name of an existing PVC to use for standalone PostgreSQL.
standalone:
  image:
    repository: postgres
    tag: "16-alpine"
  resources: {}
  persistence:
    enabled: true
    size: 512Mi
    storageClass: ""
    existingClaim: ""

## @param cluster.instances Number of PostgreSQL instances in the CloudNativePG cluster.
## @param cluster.image.repository Docker image repository for CloudNativePG cluster.
## @param cluster.image.tag Docker image tag for CloudNativePG cluster.
## @param cluster.persistence.size Size of the persistent volume for each cluster instance.
## @param cluster.persistence.storageClass Storage class for the persistent volume.
## @param cluster.persistence.existingClaim Name of an existing PVC to use (not applicable for CNPG clusters).
## @param cluster.postgresql.parameters [object] Map of PostgreSQL configuration parameters (merged into the CNPG Cluster postgresql.parameters section).
## @param cluster.pitrBackup.enabled Enable Point-in-Time Recovery backups for the CNPG cluster.
## @param cluster.pitrBackup.retentionPolicy Retention policy for PITR backups (e.g. "30d").
## @param cluster.pitrBackup.objectStorage.destinationPath Destination path in the object storage bucket.
## @param cluster.pitrBackup.objectStorage.endpointURL Endpoint URL for the object storage provider.
## @param cluster.pitrBackup.objectStorage.secretName Name of the secret containing object storage credentials.
## @param cluster.pitrBackup.objectStorage.region Region of the object storage bucket.
cluster:
  instances: 2
  image:
    repository: ghcr.io/cloudnative-pg/postgresql
    tag: "16"
  persistence:
    size: 512Mi
    storageClass: ""
    existingClaim: ""
  postgresql:
    parameters: {}
  pitrBackup:
    enabled: false
    retentionPolicy: "30d"
    objectStorage:
      destinationPath: ""
      endpointURL: ""
      secretName: ""
      region: ""

## @param external.host Hostname of the external PostgreSQL instance.
## @param external.port Port of the external PostgreSQL instance.
external:
  host: ""
  port: 5432

## @param backup.enabled Enable backup. When mode=cluster, configures barmanObjectStore on the Cluster CRD and creates a CNPG ScheduledBackup CRD. When mode=standalone or mode=external, creates a pg_dump CronJob.
## @param backup.cron Cron schedule for backup (default: weekly on Sunday at midnight UTC). In cluster mode this drives the CNPG ScheduledBackup; otherwise it drives the pg_dump CronJob.
## @param backup.retentionPolicy Retention policy for CNPG base backups (cluster mode only, e.g. "30d").
## @param backup.objectStorage.destinationPath Destination path in the object storage bucket (cluster mode only).
## @param backup.objectStorage.endpointURL Endpoint URL for the object storage provider (cluster mode only).
## @param backup.objectStorage.secretName Name of the secret containing object storage credentials (cluster mode only).
## @param backup.objectStorage.region Region of the object storage bucket (cluster mode only).
## @param backup.retention Number of days to retain pg_dump backups (standalone/external mode only).
## @param backup.timeout Maximum seconds allowed for pg_dump to complete (standalone/external mode only).
## @param backup.image.repository Docker image repository for the pg_dump backup job (standalone/external mode only, defaults to standalone image).
## @param backup.image.tag Docker image tag for the pg_dump backup job.
## @param backup.persistence.enabled Enable persistent storage for pg_dump backup files (standalone/external mode only).
## @param backup.persistence.size Size of the persistent volume for pg_dump backups.
## @param backup.persistence.storageClass Storage class for the pg_dump backup persistent volume.
## @param backup.persistence.accessMode Access mode for the pg_dump backup persistent volume.
## @param backup.persistence.existingClaim Name of an existing PVC for pg_dump backups.
backup:
  enabled: false
  cron: "0 0 * * 0"
  retentionPolicy: "30d"
  objectStorage:
    destinationPath: ""
    endpointURL: ""
    secretName: ""
    region: ""
  retention: 30
  timeout: 300
  image:
    repository: ""
    tag: ""
  persistence:
    enabled: true
    size: 512Mi
    storageClass: ""
    accessMode: ReadWriteOnce
    existingClaim: ""

## @param restore.enabled Enable restore. In cluster mode, configures CNPG recovery bootstrap. Otherwise runs a pg_dump restore Job (Helm pre-install/pre-upgrade hook).
## @param restore.name Backup to restore. In cluster mode, the name of the CNPG Backup resource (required). In standalone/external mode, a specific backup filename; empty means latest.
restore:
  enabled: false
  name: ""

## @param nodeSelector Node selector for standalone StatefulSet, backup CronJob, and restore Job pods.
nodeSelector: {}

## @param tolerations Tolerations for standalone StatefulSet, backup CronJob, and restore Job pods.
tolerations: []

## @param affinity Affinity rules for standalone StatefulSet, backup CronJob, and restore Job pods.
affinity: {}
