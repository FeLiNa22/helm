## @section PostgreSQL parameters

## @param mode Deployment mode: 'standalone', 'cluster', or 'external'.
mode: standalone

## @param username PostgreSQL username.
username: postgres

## @param database PostgreSQL database name.
database: postgres

## @param initSQL Array of SQL statements to execute after database creation (e.g. CREATE EXTENSION).
initSQL: []

## @param password.secretName Name of an existing secret containing the password (mutually exclusive with value).
## @param password.value Plain-text password. Creates a Secret when set (mutually exclusive with secretName).
password:
  secretName: ""
  value: ""

## @param standalone.image.repository Docker image repository for standalone PostgreSQL.
## @param standalone.image.tag Docker image tag for standalone PostgreSQL.
## @param standalone.resources Resource requests/limits for standalone PostgreSQL.
## @param standalone.persistence.enabled Enable persistent storage for standalone PostgreSQL.
## @param standalone.persistence.size Size of the persistent volume.
## @param standalone.persistence.storageClass Storage class for the persistent volume.
## @param standalone.persistence.existingClaim Name of an existing PVC to use for standalone PostgreSQL.
standalone:
  image:
    repository: postgres
    tag: "16-alpine"
  resources: {}
  persistence:
    enabled: true
    size: 512Mi
    storageClass: ""
    existingClaim: ""

## @param cluster.instances Number of PostgreSQL instances in the CloudNativePG cluster.
## @param cluster.image.repository Docker image repository for CloudNativePG cluster.
## @param cluster.image.tag Docker image tag for CloudNativePG cluster.
## @param cluster.persistence.size Size of the persistent volume for each cluster instance.
## @param cluster.persistence.storageClass Storage class for the persistent volume.
## @param cluster.persistence.existingClaim Name of an existing PVC to use (not applicable for CNPG clusters).
## @param cluster.postgresql.sharedPreloadLibraries List of shared libraries to preload in PostgreSQL (e.g. vchord.so).
## @param cluster.pitrBackup.enabled Enable Point-in-Time Recovery backups for the CNPG cluster.
## @param cluster.pitrBackup.retentionPolicy Retention policy for PITR backups (e.g. "30d").
## @param cluster.pitrBackup.objectStorage.destinationPath Destination path in the object storage bucket.
## @param cluster.pitrBackup.objectStorage.endpointURL Endpoint URL for the object storage provider.
## @param cluster.pitrBackup.objectStorage.secretName Name of the secret containing object storage credentials.
## @param cluster.pitrBackup.objectStorage.region Region of the object storage bucket.
cluster:
  instances: 2
  image:
    repository: ghcr.io/cloudnative-pg/postgresql
    tag: "16"
  persistence:
    size: 512Mi
    storageClass: ""
    existingClaim: ""
  postgresql:
    sharedPreloadLibraries: []
  pitrBackup:
    enabled: false
    retentionPolicy: "30d"
    objectStorage:
      destinationPath: ""
      endpointURL: ""
      secretName: ""
      region: ""

## @param external.host Hostname of the external PostgreSQL instance.
## @param external.port Port of the external PostgreSQL instance.
external:
  host: ""
  port: 5432

## @param backup.enabled Enable pg_dump CronJob backup.
## @param backup.cron Cron schedule for pg_dump backup (default: daily at 2am).
## @param backup.retention Number of days to retain backups.
## @param backup.timeout Maximum seconds allowed for pg_dump to complete.
## @param backup.image.repository Docker image repository for the backup job (defaults to standalone image).
## @param backup.image.tag Docker image tag for the backup job.
## @param backup.persistence.enabled Enable persistent storage for backup files.
## @param backup.persistence.size Size of the persistent volume for backups.
## @param backup.persistence.storageClass Storage class for the backup persistent volume.
## @param backup.persistence.accessMode Access mode for the backup persistent volume.
## @param backup.persistence.existingClaim Name of an existing PVC for backups.
backup:
  enabled: false
  cron: "0 2 * * *"
  retention: 30
  timeout: 300
  image:
    repository: ""
    tag: ""
  persistence:
    enabled: true
    size: 512Mi
    storageClass: ""
    accessMode: ReadWriteOnce
    existingClaim: ""

## @param restore.enabled Enable one-shot restore Job (Helm pre-install/pre-upgrade hook).
## @param restore.name Specific backup filename to restore. When empty, uses the latest valid backup.
restore:
  enabled: false
  name: ""

## @param nodeSelector Node selector for standalone StatefulSet, backup CronJob, and restore Job pods.
nodeSelector: {}

## @param tolerations Tolerations for standalone StatefulSet, backup CronJob, and restore Job pods.
tolerations: []

## @param affinity Affinity rules for standalone StatefulSet, backup CronJob, and restore Job pods.
affinity: {}
