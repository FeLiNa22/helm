apiVersion: v2
name: immich
description: A Helm chart for Immich - High performance self-hosted photo and video management solution
type: application
version: 1.6.14
appVersion: "v2.4.1"
keywords:
  - immich
  - photos
  - videos
  - media
  - self-hosted
home: https://immich.app
sources:
  - https://github.com/immich-app/immich
maintainers:
  - name: FeLiNa22

dependencies:
  - name: postgres
    version: ">=1.0.0"
    repository: "file://../postgres"
    alias: postgres
    condition: postgres.enabled
  - name: dragonfly
    version: ">=1.0.0"
    repository: "file://../dragonfly"
    alias: dragonfly
    condition: dragonfly.enabled
