name: penpot
maintainers:
  - name: raulpatel
    url: https://raulpatel.com
apiVersion: v2
appVersion: 2.12.1
version: 1.5.8
description: Raul Penpot Helm Chart
home: https://github.com/FeLiNa22/homeserver/tree/main/charts/penpot
icon: https://raulpatel.com/images/raul.svg
keywords:
  - kubernetes
  - penpot
  - penpotapp
  - design
sources:
  - https://github.com/penpot/penpot

dependencies:
  - name: postgres
    version: ">=1.0.0"
    repository: "file://../postgres"
    alias: postgres
    condition: postgres.enabled
  - name: dragonfly
    version: ">=1.0.0"
    repository: "file://../dragonfly"
    alias: dragonfly
    condition: dragonfly.enabled
